<!DOCTYPE html>

<html lang="en"><head>

                        "secondary-fixed-dim": "#ffb77d",

                        "surface-tint": "#2c694e",
                        "surface-container": "#e6eeff",
                        "primary-container": "#2d6a4f",

                    "borderRadius": {

                    "spacing": {

                        "gutter": "12px",

                    },
                    "fontFamily": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom scrollbar for textareas */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }

        ::-webkit-scrollbar-thumb:hover { background: #bfc9c1; }

    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-lg">
<!-- Top Navigation Bar (Contextual Sub-screen) -->
<header class="fixed top-0 left-0 w-full h-16 bg-surface/90 backdrop-blur-md border-b border-surface-variant z-50 flex items-center justify-between px-md shadow-sm">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface hover:bg-surface-container transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-h2 text-h2 text-on-surface flex-1 text-center pr-10">Edit Product</h1>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-container-margin max-w-3xl mx-auto flex flex-col gap-lg">
<!-- Image Upload Section (Bento Style) -->
<section class="relative w-full aspect-video sm:h-72 rounded-xl border border-outline-variant bg-surface-container overflow-hidden group shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
<img alt="Current Product Image" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" data-alt="Close-up of vibrant red organic tomatoes on the vine resting in a rustic wooden crate, natural sunlight casting soft shadows, crisp focus, fresh agricultural produce" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCALLD6_MNq9OUOEEALbNDG9dim40ZdTq_ZFs8LZ_5-H4IWh8s2bi-czBdgVsc9n-FDCZepI4sc2x1jtFu_JR8-jOwRzeQ4Z8KtHyN0_gB0Q9njuy1-NZChD6pFvJ4zc-HZ1XiBmOmuyf-_L2vHxiGTvHeJSwrw1pjehFXivBCbLw9CIxahEu7sCCpwoqTGKWBtHQjpu4jRYwYAL2mc4u8lg74Z2vsnFDrVXbQkG_JSBL-WXG51YvTSWL1E58XJIKhUGZCigt_ewSI"/>
<div class="absolute inset-0 bg-black/10 transition-opacity opacity-0 group-hover:opacity-100 flex items-center justify-center">
<button class="bg-surface-container-lowest/90 backdrop-blur-sm border border-outline-variant px-md py-sm rounded-full flex items-center gap-xs shadow-md transform translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300" type="button">
<span class="material-symbols-outlined text-on-surface">add_a_photo</span>
<span class="font-button text-button text-on-surface">Change Photo</span>
</button>
</div>
</section>
<!-- Form Elements -->
<form class="flex flex-col gap-md">
<!-- Basic Info Card -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-surface-variant shadow-[0_4px_12px_rgba(0,0,0,0.02)] flex flex-col gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="product_title">Product Title</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="product_title" type="text" value="Vine-Ripened Organic Tomatoes"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="product_desc">Description</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none shadow-sm" id="product_desc" rows="3">Freshly picked every morning. These tomatoes are grown without synthetic pesticides, offering a rich, sweet flavor perfect for salads and sauces.</textarea>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="nutritional_info">Nutritional Info (Optional)</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none shadow-sm" id="nutritional_info" placeholder="e.g., Rich in Vitamin C, Lycopene..." rows="2">High in Lycopene, Vitamin C, and Potassium. Low calorie.</textarea>
</div>
</div>
<!-- Pricing & Inventory Card -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-surface-variant shadow-[0_4px_12px_rgba(0,0,0,0.02)] grid grid-cols-1 sm:grid-cols-2 gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="price">Price</label>
<div class="relative">
<span class="absolute left-sm top-1/2 -translate-y-1/2 font-body-md text-body-md text-on-surface-variant">$</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-xl pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="price" step="0.01" type="number" value="4.50"/>
</div>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="unit">Unit</label>
<div class="relative">
<select class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="unit">
<option selected="" value="kg">per kg</option>
<option value="pcs">per pcs</option>
<option value="box">per box</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-base sm:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="quantity">Quantity Available</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="quantity" type="number" value="125"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-sm pt-xs mt-xs">
<button class="w-full sm:flex-1 bg-primary-container text-on-primary font-button text-button py-sm rounded-lg hover:bg-primary transition-colors flex items-center justify-center gap-xs shadow-[0_4px_12px_rgba(45,106,79,0.2)] active:scale-[0.98]" type="submit">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
                    Update Product
                </button>
<button class="w-full sm:w-auto bg-surface border border-error text-error font-button text-button py-sm px-lg rounded-lg hover:bg-error-container transition-colors flex items-center justify-center gap-xs active:scale-[0.98]" type="button">
<span class="material-symbols-outlined text-[20px]">delete</span>
                    Delete
                </button>
</div>
</form>
</main>
</body></html>
