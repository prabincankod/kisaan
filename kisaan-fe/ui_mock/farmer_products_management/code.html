<!doctype html>

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      /* Hide scrollbar for category chips */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);

  <body

    <!-- TopAppBar from JSON -->

    >
      <div class="flex items-center gap-3">
        <span
          class="material-symbols-outlined text-emerald-800 dark:text-emerald-400"
          >agriculture</span
        >
        <span
          class="text-xl font-extrabold tracking-tight text-emerald-900 dark:text-emerald-50 font-['Plus_Jakarta_Sans']"
          >Kissan</span
        >
      </div>
      <div
        class="w-8 h-8 rounded-full bg-surface-container overflow-hidden border border-outline-variant"
      >
        <img
          alt="Farmer profile picture"
          class="w-full h-full object-cover"
          data-alt="Portrait of a smiling farmer wearing a straw hat against a bright outdoor background"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuByOHE1rZBJNcp0SVo00h2a6voLemFKtKMxUmCkrv_LFRRgn_nb49ifsS9Ystt4lQJKk5BHcoPAi-bQ_9k-17s6Bdb92K7AEFmid7DHNJxaAIz2PYjZaGy-z5gEOvwl9GB1Q2CRLMII-nXQRjfJlCUbhSi9EFxprVKLUr6PBODclnjM8qVCQeWjvy_yt_8AhSc3gkl1TSsOQEHvliHD-RXc1RHbeFMjujwcJNiG3vx44V1kK5r6mSMKvZqP8umP2siRAWfMFKQ1-mg"
        />
      </div>
    </header>
    <!-- Main Canvas -->

      class="px-container-margin md:px-lg max-w-7xl mx-auto mt-lg flex flex-col gap-lg"

        <h1 class="font-h1 text-h1 text-on-surface">My Inventory</h1>
        <div class="relative w-full">
          <span
            class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline"
            >search</span

          <input
            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-sm pl-10 pr-sm focus:outline-none focus:border-primary focus:border-2 text-body-lg font-body-lg text-on-surface transition-all"
            placeholder="Search products..."
            type="text"
          />
        </div>
      </section>
      <!-- Category Chips -->
      <section class="flex gap-xs overflow-x-auto no-scrollbar pb-1">
        <button
          class="bg-primary text-on-primary font-label-md text-label-md px-4 py-2 rounded-full whitespace-nowrap transition-colors"
        >
          All Products

        <button
          class="border border-outline-variant text-on-surface-variant bg-surface-container-lowest font-label-md text-label-md px-4 py-2 rounded-full whitespace-nowrap hover:bg-surface-container transition-colors"

        >
          Fruits

        <button
          class="border border-outline-variant text-on-surface-variant bg-surface-container-lowest font-label-md text-label-md px-4 py-2 rounded-full whitespace-nowrap hover:bg-surface-container transition-colors"
        >
          Grains
        </button>
        <button
          class="border border-outline-variant text-on-surface-variant bg-surface-container-lowest font-label-md text-label-md px-4 py-2 rounded-full whitespace-nowrap hover:bg-surface-container transition-colors"
        >
          Dairy
        </button>
      </section>
      <!-- Product Grid -->
      <section
        class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-sm md:gap-md"

        <!-- Product Card 1 -->

            </div>
          </div>
        </div>
        <!-- Product Card 2 -->

          class="bg-surface-container-lowest rounded-lg border border-surface-variant overflow-hidden flex flex-col hover:shadow-md transition-shadow"
        >
          <div
            class="relative aspect-[4/3] bg-surface-container-high overflow-hidden"

              $1.20<span
                class="text-body-md font-normal text-on-surface-variant"

            <div
              class="inline-flex items-center px-2 py-1 rounded-full bg-surface-container-high w-fit mt-1 border border-outline-variant/30"

            </div>
          </div>
        </div>
        <!-- Product Card 3 -->
        <div
          class="bg-surface-container-lowest rounded-lg border border-surface-variant overflow-hidden flex flex-col hover:shadow-md transition-shadow"
        >
          <div
            class="relative aspect-[4/3] bg-surface-container-high overflow-hidden"
          >
            <img
              alt="Green Bell Peppers"
              class="w-full h-full object-cover"
              data-alt="Vibrant green bell peppers stacked neatly at a farmers market stand with bright lighting"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYnYVzspfEN3dgPHMiyRySTDPgqd9DFoER-ZzrYHHxBy9n8gFmlrEGMqrbGmdBeqVt-L-vOfYg3vrprunJIcqTWM5Vw5dj2CoAK20fqf73rk2KEDxEeoRoqAGy-ljnG2zsDOHrdKJatIRAs0oBcvuopEgYXBtXzdE6Ql0krDqHD-D5lEv2bTGr_x2EspINgevmFF3dLQLF27aIWI1jmkuM6UqLsxcawcUJDWNFUo1HcNPw3ZfwNi8mLY7997xMoykiR7i4lBGfwII"

          <div class="p-sm flex flex-col gap-base flex-grow">
            <h3
              class="font-body-lg text-body-lg font-semibold text-on-surface line-clamp-1"
            >
              Green Bell Peppers
            </h3>
            <div class="font-h2 text-h2 text-primary font-bold mt-auto">
              $3.00<span
                class="text-body-md font-normal text-on-surface-variant"
                >/kg</span
              >
            </div>
            <div
              class="inline-flex items-center px-2 py-1 rounded-full bg-surface-container-high w-fit mt-1 border border-outline-variant/30"
            >
              <span class="w-1.5 h-1.5 rounded-full bg-primary mr-1.5"></span>
              <span class="text-on-surface-variant text-label-md font-label-md"
                >120 kg in stock</span

            </div>
          </div>
        </div>
        <!-- Product Card 4 -->

              Red Onions

            <div class="font-h2 text-h2 text-primary font-bold mt-auto">
              $1.80<span
                class="text-body-md font-normal text-on-surface-variant"
                >/kg</span
              >

              <span class="w-1.5 h-1.5 rounded-full bg-secondary mr-1.5"></span>
              <span
                class="text-on-secondary-container text-label-md font-label-md"
                >Low: 15 kg left</span
              >
            </div>
          </div>
        </div>
        <!-- Product Card 5 -->
        <div
          class="bg-surface-container-lowest rounded-lg border border-surface-variant overflow-hidden flex flex-col hover:shadow-md transition-shadow"
        >
          <div
            class="relative aspect-[4/3] bg-surface-container-high overflow-hidden flex items-center justify-center bg-surface-container-high"
          >
            <span
              class="material-symbols-outlined text-[48px] text-outline-variant"
              >image</span
            >
          </div>
          <div class="p-sm flex flex-col gap-base flex-grow">
            <h3
              class="font-body-lg text-body-lg font-semibold text-on-surface line-clamp-1"
            >
              Sweet Corn
            </h3>
            <div class="font-h2 text-h2 text-primary font-bold mt-auto">
              $4.50<span
                class="text-body-md font-normal text-on-surface-variant"
                >/doz</span
              >
            </div>
            <div
              class="inline-flex items-center px-2 py-1 rounded-full bg-error-container w-fit mt-1 border border-error/20"
            >
              <span class="w-1.5 h-1.5 rounded-full bg-error mr-1.5"></span>
              <span class="text-on-error-container text-label-md font-label-md"
                >Out of stock</span

          </div>

    <!-- Floating Action Button (FAB) -->
    <button
      class="fixed bottom-[88px] right-container-margin w-14 h-14 rounded-xl bg-primary text-on-primary flex items-center justify-center shadow-[0_8px_24px_rgba(15,82,56,0.25)] hover:bg-primary-container active:scale-95 transition-all z-40 md:bottom-lg"
    >
      <span
        class="material-symbols-outlined"
        style="font-variation-settings: &quot;wght&quot; 600"
        >add</span
      >
    </button>
    <!-- BottomNavBar from JSON -->
    <nav
      class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-2 pb-6 bg-white dark:bg-stone-950 border-t border-emerald-50 dark:border-stone-900 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] rounded-t-2xl font-['Plus_Jakarta_Sans'] text-[11px] font-medium md:hidden"
    >
      <button
        class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 active:scale-90 transition-all duration-200 ease-out"
      >
        <span class="material-symbols-outlined">home</span>
        <span class="mt-1">Home</span>
      </button>
      <button
        class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-100 rounded-2xl px-5 py-1.5 active:scale-90 transition-all duration-200 ease-out"
      >
        <span
          class="material-symbols-outlined"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >shopping_basket</span

      </button>
      <button
        class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 active:scale-90 transition-all duration-200 ease-out"
      >
        <span class="material-symbols-outlined">receipt_long</span>
        <span class="mt-1">Orders</span>
      </button>
      <button
        class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-5 py-1.5 hover:text-emerald-600 dark:hover:text-emerald-300 active:scale-90 transition-all duration-200 ease-out"
      >
        <span class="material-symbols-outlined">person</span>
        <span class="mt-1">Profile</span>
      </button>
    </nav>

</html>
